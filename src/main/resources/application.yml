spring:
  application:
    name: Egyptian CS Problem solving platform

  datasource:
    url: jdbc:postgresql://127.0.0.1:5433/judge_db
    username: judge
    password: judge_super_secure_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: judge-worker-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "dev.judge.*"

  security:
    filter:
      order: 10

server:
  port: 8080
  servlet:
    context-path: /v1

jwt:
  secret: ${JWT_SECRET:3d7f4b2a9e1c6f8d0b5a2e7c4f9d1b6a3e8c5f2d7a4b9e0c3f6a1d8b5e2c7f4}
  expiration-ms: 900000
  refresh-expiration-ms: 604800000

judge:
  sandbox:
    image: eclipse-temurin:21-jdk-alpine
    time-limit-ms: 5000
    memory-limit-mb: 256
    cpus: 0.5
    pids-limit: 50

kafka:
  topics:
    submission-created: submission.created
    submission-result: submission.result

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    dev.judge: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
    com.zaxxer.hikari: DEBUG